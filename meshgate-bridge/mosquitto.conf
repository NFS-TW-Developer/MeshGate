# --- 基礎服務設定 ---
listener 1883
allow_anonymous true
persistence false

# 日誌：正式環境僅 error/warning；除錯可加 log_type notice / information
log_dest stdout
log_type error
log_type warning
# log_type notice
# log_type information

# --- 橋接官方伺服器 (SSL/TLS 8883) ---
connection official_bridge
address mqtt.meshtastic.org:8883

# 官方身分驗證
remote_username meshdev
remote_password large4cats

# TLS 安全設定
# 注意：在 Linux Docker 中，通常掛載 /etc/ssl/certs 即可找到 ca-certificates.crt
bridge_cafile /etc/ssl/certs/ca-certificates.crt
bridge_insecure false
bridge_protocol_version mqttv311

# Bridge topic 規則（較具體者在前）
# 從官方收：全部 msh/TW（含 json）
topic msh/TW/# in 0
# 只把這些發到官方（不要用 both 涵蓋 json）
topic msh/TW/+/e/# both 0
topic msh/TW/+/map both 0

cleansession true
start_type automatic
keepalive_interval 60