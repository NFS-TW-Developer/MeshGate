%% ==================================================================
%% 1. 管理員與系統權限 (最高優先級)
%% ==================================================================
{allow, {username, "admin"}, all, ["#", "$SYS/#"]}.
{allow, {username, "dashboard"}, subscribe, ["$SYS/#"]}.
{allow, {ipaddr, "127.0.0.1"}, all, ["#", "$SYS/#"]}.

%% ==================================================================
%% 2. LOCAL_BRIDGE 帳號：Python 網關專用 (核心關鍵)
%% ==================================================================
%% 網關需要訂閱遠端，並將資料發布到本地。
%% 為了過濾效果，網關應該擁有發布到所有 TW 層級的權限，但不需要訂閱本地訊息。
{allow, {username, "LOCAL_BRIDGE"}, publish, ["msh/TW/#"]}.

%% ==================================================================
%% 3. 安全攔截
%% ==================================================================
{deny, all, subscribe, ["$SYS/#", {eq, "#"}, {eq, "+/#"}]}.
{deny, all}.